<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Extended Toolbar</title>
    <style>
      :root {
        --toolbar-window-margin: 10px; /* Matches with EXTENDED_TOOLBAR_WINDOW_MARGIN */

        --toolbar-background-color: #FFFFFF;
        --toolbar-border-color: #020202;
        --toolbar-width: 44px;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
      }

      button {
        background: none;
        border: none;
        padding: 0;
      }

      button:focus {
        outline: none;
      }

      .toolbar__mode-switcher {
        -webkit-app-region: drag;
      }

      .toolbar__close,
      .toolbar__main-button {
        -webkit-app-region: no-drag;  /* overlaps switcher */
      }

      .toolbar-extended {
        position: absolute;
        top: var(--toolbar-window-margin);
        left: var(--toolbar-window-margin);
      }

      #toolbar {
        display: flex;
        flex-direction: column;
      }

      .toolbar__close {
        position: absolute;
        top: -5px;
        right: -5px;
        z-index: 1;
        background-color: var(--toolbar-background-color);
        border: 1px solid var(--toolbar-border-color);
        border-radius: 15px;
      }

      .toolbar__close button {
        display: flex;
        padding: 2px;
        justify-content: center;
        align-items: center;
      }

      .toolbar__close svg {
        width: 12px;
        height: 12px;
      }

      .toolbar__mode-switcher {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: var(--toolbar-width);
        box-sizing: border-box;
        background-color: var(--toolbar-background-color);
        border: 1px solid var(--toolbar-border-color);
        border-radius: 10px;
      }

      .toolbar__main-button {
        display: flex;
        justify-content: center;
        padding: 10px 0;
      }

      .toolbar__main-button button {
        display: flex;
        align-self: center;
        cursor: pointer;
      }

      .toolbar__main-button svg {
        width: 30px;
        height: 30px;
      }

      .toolbar__draglines {
        display: flex;
        padding: 4px 0;
        justify-content: center;
        align-items: center;
      }

      .draglines {
        display: grid;
        row-gap: 2px;
        column-gap: 2px;
        grid-template-columns: repeat(3, min-content);
      }

      .draglines div {
        width: 2px;
        height: 2px;
        border-radius: 50%;
        background-color: var(--toolbar-border-color);
      }


    </style>
  </head>

  <body>
    <aside id="toolbar" class="toolbar-extended">
      <div class="toolbar__mode-switcher">
        <div class="toolbar__draglines">
          <div class="draglines">
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
          </div>
        </div>

        <div class="toolbar__main-button">
          <button tabindex="-1" title="Draw Mode">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
              <path d="M18.375 2.625a1 1 0 0 1 3 3l-9.013 9.014a2 2 0 0 1-.853.505l-2.873.84a.5.5 0 0 1-.62-.62l.84-2.873a2 2 0 0 1 .506-.852z"></path>
            </svg>
          </button>
        </div>

        <div class="toolbar__draglines">
          <div class="draglines">
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
          </div>
        </div>
      </div>



      <div class="toolbar__close">
        <button tabindex="-1">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"></path>
          </svg>
        </button>
      </div>
    </aside>
  </body>
</html>
