<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Extended Toolbar</title>
    <style>
      :root {
        --toolbar-window-margin: 10px; /* Matches with EXTENDED_TOOLBAR_WINDOW_MARGIN */

        --toolbar-background-color: #FFFFFF;
        --toolbar-border-color: #020202;
        --toolbar-width: 44px;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
      }

      button {
        background: none;
        border: none;
        padding: 0;
      }

      button:focus {
        outline: none;
      }

      .toolbar__mode-switcher {
        -webkit-app-region: drag;
      }

      .toolbar__close,
      .toolbar__main-button {
        -webkit-app-region: no-drag;  /* overlaps switcher */
      }

      .toolbar-extended {
        position: absolute;
        top: var(--toolbar-window-margin);
        left: var(--toolbar-window-margin);
      }

      #toolbar {
        display: flex;
      }

      #toolbar.toolbar-orient--vertical {
        flex-direction: column;
        width: var(--toolbar-width);

        .toolbar__mode-switcher {
          flex-direction: column;
          width: var(--toolbar-width);
          height: auto;
          border-radius: 10px;
        }

        .toolbar__draglines {
          padding: 4px 0;
        }

        .draglines {
          grid-template-columns: repeat(3, min-content);
          grid-template-rows: repeat(2, min-content);
        }

        .toolbar__main-button {
          padding: 10px 0;
        }
      }

      #toolbar.toolbar-orient--horizontal {
        flex-direction: row;
        align-items: center;
        height: var(--toolbar-width);

        .toolbar__mode-switcher {
          flex-direction: row;
          width: auto;
          height: 100%;
          border-radius: 10px;
          align-items: center;
        }

        .toolbar__draglines {
          padding: 0 6px;
          height: 100%;
          display: flex;
          align-items: center;
        }

        .draglines {
          grid-template-columns: repeat(2, min-content);
          grid-template-rows: repeat(3, min-content);
        }

        .toolbar__main-button {
          padding: 0 10px;
          height: 100%;
          display: flex;
          align-items: center;
        }
      }

      #toolbar.toolbar--down { 
        flex-direction: column; 
        .toolbar__mode-switcher { border-top-left-radius: 10px; border-top-right-radius: 10px; }
      }
      #toolbar.toolbar--up   { 
        flex-direction: column-reverse; 
        .toolbar__mode-switcher { border-bottom-left-radius: 10px; border-bottom-right-radius: 10px; }
      }
      #toolbar.toolbar--right { 
        flex-direction: row; 
        .toolbar__mode-switcher { border-top-left-radius: 10px; border-bottom-left-radius: 10px; }
      }
      #toolbar.toolbar--left  { 
        flex-direction: row-reverse; 
        .toolbar__mode-switcher { border-top-right-radius: 10px; border-bottom-right-radius: 10px; }
      }

      .toolbar__close {
        position: absolute;
        top: -5px;
        right: -5px;
        z-index: 1;
        background-color: var(--toolbar-background-color);
        border: 1px solid var(--toolbar-border-color);
        border-radius: 15px;
      }

      .toolbar__close button {
        display: flex;
        padding: 2px;
        justify-content: center;
        align-items: center;
      }

      .toolbar__close svg {
        width: 12px;
        height: 12px;
      }

      .toolbar__mode-switcher {
        display: flex;
        align-items: center;
        box-sizing: border-box;
        background-color: var(--toolbar-background-color);
        border: 1px solid var(--toolbar-border-color);
      }

      .toolbar__main-button {
        display: flex;
        justify-content: center;
      }

      .toolbar__main-button button {
        display: flex;
        align-self: center;
        cursor: pointer;
      }

      .toolbar__main-button svg {
        width: 30px;
        height: 30px;
      }

      .toolbar__draglines {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .draglines {
        display: grid;
        row-gap: 2px;
        column-gap: 2px;
      }

      .draglines div {
        width: 2px;
        height: 2px;
        border-radius: 50%;
        background-color: var(--toolbar-border-color);
      }

      .expansion-arrow {
        display: none;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100%;
        min-height: 10px;
        min-width: 10px;
        color: var(--toolbar-border-color);
      }

      .expansion-arrow svg {
        width: 14px;
        height: 14px;
      }

      /* Logic to show arrows and hide dots based on direction */
      #toolbar.toolbar--up .toolbar__draglines:first-child .draglines { display: none; }
      #toolbar.toolbar--up .toolbar__draglines:first-child .expansion-arrow--up { display: flex; }

      #toolbar.toolbar--down .toolbar__draglines:last-child .draglines { display: none; }
      #toolbar.toolbar--down .toolbar__draglines:last-child .expansion-arrow--down { display: flex; }

      #toolbar.toolbar--left .toolbar__draglines:first-child .draglines { display: none; }
      #toolbar.toolbar--left .toolbar__draglines:first-child .expansion-arrow--left { display: flex; }

      #toolbar.toolbar--right .toolbar__draglines:last-child .draglines { display: none; }
      #toolbar.toolbar--right .toolbar__draglines:last-child .expansion-arrow--right { display: flex; }


    </style>
  </head>

  <body>
    <aside id="toolbar" class="toolbar--down toolbar-orient--vertical toolbar-extended">
      <div class="toolbar__mode-switcher">
        <div class="toolbar__draglines">
          <div class="draglines">
            <div></div><div></div><div></div><div></div><div></div><div></div>
          </div>
          <div class="expansion-arrow expansion-arrow--up">
            <svg viewBox="0 0 320 512"><path fill="currentColor" d="M177 159.7l136 136c9.4 9.4 9.4 24.6 0 33.9l-22.6 22.6c-9.4 9.4-24.6 9.4-33.9 0L160 255.9l-96.4 96.4c-9.4 9.4-24.6 9.4-33.9 0L7 329.7c-9.4-9.4-9.4-24.6 0-33.9l136-136c9.4-9.5 24.6-9.5 34 0z"></path></svg>
          </div>
          <div class="expansion-arrow expansion-arrow--left">
            <svg viewBox="0 0 256 512"><path fill="currentColor" d="M31.7 239l136-136c9.4-9.4 24.6-9.4 33.9 0l22.6 22.6c9.4 9.4 9.4 24.6 0 33.9L127.9 256l96.4 96.4c9.4 9.4 9.4 24.6 0 33.9L201.7 409c-9.4 9.4-24.6 9.4-33.9 0l-136-136c-9.5-9.4-9.5-24.6-.1-34z"></path></svg>
          </div>
        </div>

        <div class="toolbar__main-button">
          <button tabindex="-1" title="Draw Mode">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
              <path d="M18.375 2.625a1 1 0 0 1 3 3l-9.013 9.014a2 2 0 0 1-.853.505l-2.873.84a.5.5 0 0 1-.62-.62l.84-2.873a2 2 0 0 1 .506-.852z"></path>
            </svg>
          </button>
        </div>

        <div class="toolbar__draglines">
          <div class="draglines">
            <div></div><div></div><div></div><div></div><div></div><div></div>
          </div>
          <div class="expansion-arrow expansion-arrow--down">
            <svg viewBox="0 0 320 512"><path fill="currentColor" d="M143 352.3L7 216.3c-9.4-9.4-9.4-24.6 0-33.9l22.6-22.6c9.4-9.4 24.6-9.4 33.9 0l96.4 96.4 96.4-96.4c9.4-9.4 24.6-9.4 33.9 0l22.6 22.6c9.4 9.4 9.4 24.6 0 33.9l-136 136c-9.4 9.5-24.6 9.5-34 0z"></path></svg>
          </div>
          <div class="expansion-arrow expansion-arrow--right">
            <svg viewBox="0 0 256 512"><path fill="currentColor" d="M224.3 273l-136 136c-9.4 9.4-24.6 9.4-33.9 0l-22.6-22.6c-9.4-9.4-9.4-24.6 0-33.9l96.4-96.4-96.4-96.4c-9.4-9.4-9.4-24.6 0-33.9L54.3 103c9.4-9.4 24.6-9.4 33.9 0l136 136c9.5 9.4 9.5 24.6.1 34z"></path></svg>
          </div>
        </div>
      </div>



      <div class="toolbar__close">
        <button tabindex="-1">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"></path>
          </svg>
        </button>
      </div>
    </aside>
  </body>
</html>
